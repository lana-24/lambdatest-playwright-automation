name: Run Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y libgbm1
      
      - name: Run tests
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          UI_BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          pytest tests/ --html=report.html --self-contained-html
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: report.html
      
      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ PASSED"
            EMOJI="🎉"
          else
            STATUS="❌ FAILED"
            EMOJI="💥"
          fi
          
          MESSAGE="📊 *Test Automation Report* ${EMOJI}%0A%0A📝 *Status:* ${STATUS}%0A📁 *Repo:* ${{ github.repository }}%0A🌿 *Branch:* ${{ github.ref_name }}%0A🕐 *Time:* $(date '+%Y-%m-%d %H:%M:%S')%0A%0A🔗 *Actions:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown"