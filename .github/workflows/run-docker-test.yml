name: Run Tests with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # bisa dijalankan manual

jobs:
  docker-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t my-tests .
      
      - name: Run tests in Docker
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          UI_BASE_URL: ${{ secrets.UI_BASE_URL }}
        run: |
          docker run \
            -e EMAIL="${{ secrets.EMAIL }}" \
            -e PASSWORD="${{ secrets.PASSWORD }}" \
            -e UI_BASE_URL="${{ secrets.UI_BASE_URL }}" \
            -v $(pwd)/reports:/app/reports \
            my-tests
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-playwright-report
          path: reports/
      
      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ PASSED (Docker)"
            EMOJI="🎉"
          else
            STATUS="❌ FAILED (Docker)"
            EMOJI="💥"
          fi
          
          MESSAGE="📊 *Test Automation Report (Docker)* ${EMOJI}%0A%0A📝 *Status:* ${STATUS}%0A📁 *Repo:* ${{ github.repository }}%0A🌿 *Branch:* ${{ github.ref_name }}%0A🕐 *Time:* $(date '+%Y-%m-%d %H:%M:%S')%0A%0A🔗 *Actions:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown"